<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD045" />
      <stop offset="100%" stop-color="#D98C00" />
    </radialGradient>
    
    <path id="droplet" d="M0,-10 C5,-10 8,-5 8,0 C8,5 5,8 0,15 C-5,8 -8,5 -8,0 C-8,-5 -5,-10 0,-10 Z" fill="url(#goldGrad)" />
  </defs>

  <rect width="900" height="350" fill="white"/>

  <g transform="translate(180,175)">
    <g>
      <script>/* Logic: rotate(i * 15) */</script>
      <g transform="rotate(0) translate(0,-110) scale(1.4)"><use href="#droplet"/></g>
      <g transform="rotate(15) translate(0,-110) scale(1.4)"><use href="#droplet"/></g>
      <g transform="rotate(30) translate(0,-110) scale(1.4)"><use href="#droplet"/></g>
      </g>
    
    </g>

  <g transform="translate(380,150)">
    <text x="0" y="0" font-size="32" font-family="Arial, sans-serif" fill="#1a1a1a">مدينة إكسبو دبي</text>
    <text x="0" y="55" font-size="48" font-weight="bold" font-family="Arial, sans-serif" letter-spacing="2" fill="#1a1a1a">EXPO CITY DUBAI</text>
  </g>
</svg>
